        let firebaseStats = {};        
        let activeGameName = null;        
        let sortedApps = [];
        
        async function fetchAllFirebaseStats() {            
            try {                
                const snapshot = await db.collection('games').get();                
                snapshot.forEach(doc => { firebaseStats[doc.id] = doc.data(); });            
            } catch (error) {}        
        }
        
        async function loadApps() {            
            await fetchAllFirebaseStats();
            sortedApps = manualApps.map(app => {                
                const safeId = app.name.replace(/[^a-zA-Z0-9]/g, '');                 
                const stats = firebaseStats[safeId] || { plays: 0, likes: 0, dislikes: 0 };                
                const score = (stats.likes * 10) + (stats.plays * 1) - (stats.dislikes * 5);                
                return { ...app, dbId: safeId, plays: stats.plays, likes: stats.likes, dislikes: stats.dislikes, score: score };            
            }).sort((a, b) => b.score - a.score);
            updateCountAndRender(sortedApps);        
        }
        
        window.incrementGameStat = async function(statType) {            
            if (!activeGameName) return;            
            const safeId = activeGameName.replace(/[^a-zA-Z0-9]/g, '');            
            const gameRef = db.collection('games').doc(safeId);
            if(statType === 'likes') { document.getElementById('likesCount').innerText = parseInt(document.getElementById('likesCount').innerText) + 1; document.getElementById('likeBtn').disabled = true; document.getElementById('dislikeBtn').disabled = true; }             
            else if (statType === 'dislikes') { document.getElementById('dislikesCount').innerText = parseInt(document.getElementById('dislikesCount').innerText) + 1; document.getElementById('likeBtn').disabled = true; document.getElementById('dislikeBtn').disabled = true; }
            try {                
                const docSnap = await gameRef.get();                
                if (!docSnap.exists) await gameRef.set({ plays: statType === 'plays'?1:0, likes: statType === 'likes'?1:0, dislikes: statType === 'dislikes'?1:0, reports: 0 });                
                else await gameRef.update({ [statType]: firebase.firestore.FieldValue.increment(1) });            
            } catch (error) {}        
        }
        
        function updateCountAndRender(appsToRender) {            
            document.getElementById('dataCount').textContent = `Showing ${appsToRender.length} applications`;            
            const zonesWrapper = document.getElementById('zonesWrapper');

            if (appsToRender.length === 0) { zonesWrapper.innerHTML = '<p style="color:var(--text-muted); font-size:1.2rem; text-align:center; width:100%;">No apps found.</p>'; return; }
            const fragment = document.createDocumentFragment();            
            appsToRender.forEach(app => {                
                const item = document.createElement("div"); item.className = "zone-item";                
                item.innerHTML = `                    
                    <img src="${app.cover}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x200/0f172a/0ea5e9?text=${encodeURIComponent(app.name)}'">                    
                    <div class="zone-name">${app.name}</div>                    
                    <div class="hover-stats">                        
                        <div class="stat-row"><i class="fa-solid fa-eye" style="color: var(--accent-cyan);"></i> ${app.plays || 0}</div>                        
                        <div class="stat-row"><i class="fa-solid fa-thumbs-up" style="color: #22c55e;"></i> ${app.likes || 0}</div>                        
                        <div class="stat-row"><i class="fa-solid fa-thumbs-down" style="color: #ef4444;"></i> ${app.dislikes || 0}</div>                    
                    </div>                
                `;                
                item.onclick = (e) => { e.preventDefault(); openZone(app); };                
                fragment.appendChild(item);            
            });            
            zonesWrapper.appendChild(fragment);        
        }
        
        document.getElementById('dumbSearchInput').addEventListener('input', (e) => {             
            const query = e.target.value.toLowerCase().trim();            
            if (query === '') { updateCountAndRender(sortedApps); return; }            
            const searchTokens = query.split(/\s+/);            
            const results = sortedApps.filter(z => searchTokens.every(token => `${z.name} ${z.author || ''}`.toLowerCase().includes(token)));            
            updateCountAndRender(results);        
        });
        
        window.openZone = function(app) {            
            activeGameName = app.name;            
            const zoneFrame = document.getElementById('zoneFrame');                        
            zoneFrame.src = "about:blank";            
            document.getElementById('zoneName').textContent = app.name;            
            document.getElementById('pageGameTitle').textContent = app.name;            
            document.getElementById('zoneAuthor').textContent = app.author || "Web Application";            
            document.getElementById('toolbarIcon').src = app.cover;                        
            document.getElementById('playsCount').innerText = app.plays || 0;            
            document.getElementById('likesCount').innerText = app.likes || 0;            
            document.getElementById('dislikesCount').innerText = app.dislikes || 0;            
            document.getElementById('likeBtn').disabled = false;            
            document.getElementById('dislikeBtn').disabled = false;                        
            document.getElementById('appDesc').innerText = app.description || "No description provided.";            
            document.getElementById('pageTags').innerHTML = (app.tags || []).map(t => `<span class='tag'>${t}</span>`).join('');            
            document.getElementById('appNotes').innerHTML = (app.notes || []).map(n => `<li>${n}</li>`).join('') || "<li>No notes available.</li>";                        
            incrementGameStat('plays');            
            document.getElementById('zoneViewer').style.display = "block";
            setTimeout(() => { zoneFrame.src = app.url; }, 100);        
        };
        
        window.closeZone = function() { document.getElementById('zoneViewer').style.display = "none"; document.getElementById('zoneFrame').src = "about:blank"; activeGameName = null; };        
        window.reloadFrame = function() { const f = document.getElementById('zoneFrame'); const c = f.src; f.src = "about:blank"; setTimeout(() => { f.src = c; }, 50); };        
        window.fullscreenZone = function() { const f = document.getElementById('zoneFrame'); if (f.requestFullscreen) f.requestFullscreen(); else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen(); };        
        window.openSiteInAboutBlank = function() { let w = window.open('about:blank', '_blank'); w.document.body.style.margin = '0'; w.document.body.style.height = '100vh'; w.document.body.style.overflow = 'hidden'; let i = w.document.createElement('iframe'); i.style.border = 'none'; i.style.width = '100%'; i.style.height = '100%'; i.src = window.location.href; w.document.body.appendChild(i); window.location.replace('https://classroom.google.com'); };        
        window.openGameInAboutBlank = function() { const f = document.getElementById('zoneFrame'); if (!f.src || f.src === 'about:blank') return; let w = window.open('about:blank', '_blank'); w.document.body.style.margin = '0'; w.document.body.style.height = '100vh'; w.document.body.style.overflow = 'hidden'; let i = w.document.createElement('iframe'); i.style.border = 'none'; i.style.width = '100%'; i.style.height = '100%'; i.src = f.src; w.document.body.appendChild(i); closeZone(); };
        
        loadApps();
        
        const ship = document.getElementById('custom-v-cursor');        
        const iframeBox = document.getElementById('iframeBox');        
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;        
        let shipX = window.innerWidth / 2, shipY = window.innerHeight / 2;        
        let currentAngle = 0, isCursorVisible = false;
        
        document.addEventListener('mousemove', (e) => {            
            mouseX = e.clientX; mouseY = e.clientY;            
            const overIframe = e.target.closest('#iframeBox') || e.target.tagName.toLowerCase() === 'iframe';            
            if (overIframe) { if (isCursorVisible) { ship.style.opacity = '0'; isCursorVisible = false; } }             
            else { if (!isCursorVisible) { ship.style.opacity = '1'; isCursorVisible = true; } }        
        });
        
        if (iframeBox) {            
            iframeBox.addEventListener('mouseenter', () => { ship.style.opacity = '0'; isCursorVisible = false; });            
            iframeBox.addEventListener('mouseleave', () => { ship.style.opacity = '1'; isCursorVisible = true; });        
        }
        
        document.addEventListener('mouseout', (e) => { if (e.relatedTarget === null) { ship.style.opacity = '0'; isCursorVisible = false; }});        
        window.addEventListener('blur', () => { ship.style.opacity = '0'; isCursorVisible = false; });        
        document.addEventListener('visibilitychange', () => { if (document.hidden) { ship.style.opacity = '0'; isCursorVisible = false; }});
        
        function animateCursor() {            
            const dx = mouseX - shipX; const dy = mouseY - shipY;            
            shipX += dx * 0.45; shipY += dy * 0.45;            
            if (Math.abs(dx) > 1 || Math.abs(dy) > 1) { currentAngle = Math.atan2(dy, dx) * (180 / Math.PI) + 90; }            
            ship.style.transform = `translate3d(${shipX - 16}px, ${shipY - 16}px, 0) rotate(${currentAngle}deg)`;            
            requestAnimationFrame(animateCursor);        
        }        
        animateCursor();    
    </script>
</body>
</html>
